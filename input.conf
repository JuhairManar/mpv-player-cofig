# --- PotPlayer Volume Controls (5% Volume Steps) ---
UP           osd-msg-bar add volume 5
DOWN         osd-msg-bar add volume -5
m            osd-msg-bar cycle mute

# --- PotPlayer Seek Controls (Forced EXACT Steps for smooth forwarding) ---
RIGHT        osd-msg-bar seek  5 exact
LEFT         osd-msg-bar seek -5 exact
Ctrl+RIGHT   osd-msg-bar seek  30 exact
Ctrl+LEFT    osd-msg-bar seek -30 exact
Shift+RIGHT  osd-msg-bar seek  60 exact
Shift+LEFT   osd-msg-bar seek -60 exact
Alt+RIGHT    seek  300 exact
Alt+LEFT     seek -300 exact

# --- PotPlayer Playback Speed ---
z            set speed 1.0
x            add speed -0.1
c            add speed 0.1

# --- PotPlayer Frame-by-Frame ---
f            frame-step
d            frame-back-step

# --- PotPlayer Subtitle Controls ---
Alt+h        osd-msg-bar cycle sub-visibility

# --- PotPlayer Window / Zoom ---
ENTER        cycle fullscreen
ESC          set fullscreen no
SPACE        cycle pause

# --- PotPlayer Mouse Controls (5% Volume Steps via Scroll Wheel) ---
WHEEL_UP      osd-msg-bar add volume 5
WHEEL_DOWN    osd-msg-bar add volume -5
MBTN_LEFT_DBL cycle fullscreen

# --- PotPlayer / KMPlayer Stop Control (F4 instead of S) ---
F4            stop

# --- PotPlayer Window Sizes (1 through 0) ---
1            set current-window-scale 0.5     # 50% Size
2            set current-window-scale 1.0     # 100% (Original Size)
3            set current-window-scale 1.5     # 150% Size
4            set current-window-scale 2.0     # 200% Size
5            set window-scale 1.0; set fullscreen yes 
6            set window-scale 1.0; set maximized yes  
7            set current-window-scale 0.7     
8            set current-window-scale 1.2     
9            set current-window-scale 2.5     
0            set current-window-scale 3.0     

# --- PotPlayer Open File Shortcut (Fixed Native Zenity Window Popup) ---
F3           run "sh" "-c" "mpv \"$(zenity --file-selection --title='Select Video File')\""
Ctrl+o       run "sh" "-c" "mpv \"$(zenity --file-selection --title='Select Video File')\""

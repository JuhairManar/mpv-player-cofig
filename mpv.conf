# ==============================================================================
#                 POTPLAYER STYLE CONVERGED CONFIGURATION (UNLIMITED)
# ==============================================================================

# --- PotPlayer Interface Controls ---
osc=yes
osd-bar=no

# --- Force Window to Stay Open on Stop/Idle (PotPlayer Style) ---
keep-open=yes
idle=yes
player-operation-mode=pseudo-gui
force-window=yes
ontop=yes

# --- Auto-Hide Bar After 3 Seconds ---
script-opts=osc-visibility=auto,osc-hideidleset=3000

# --- PotPlayer Text Style in the Corner ---
osd-font="sans-serif"
osd-font-size=28
osd-color="#FFFFFF"
osd-border-size=1.5
osd-border-color="#000000"

# --- PotPlayer-Style Aggressive Streaming Cache (Supports 8GB+ Files) ---
cache=yes                               # Force cache for all network streams
cache-on-disk=yes                       # Write data directly to storage
cache-dir="~/.config/mpv/stream_cache"  # Where temporary parts are downloaded (Auto-deletes on close)

# --- 8GB+ HIGH-SPEED DOWNLOAD + WINDOW DRAG FIX ---
demuxer-max-bytes=4096MiB               # Allocates enough index memory to handle massive 8GB files smoothly
demuxer-max-back-bytes=2048MiB          # Holds onto 2GB of past video data for instant scrubbing
cache-secs=999999                       # Keep downloading continuously without pausing
demuxer-readahead-secs=999999           # Force mpv to grab the whole file from start to finish
vd-queue-max-bytes=100MiB               # Extra UI thread buffer to keep window dragging lag-free during heavy disk writes

# --- Ultimate Fix for Network Track-Switching Cache Drops ---
sub-auto=all                            # Load all available subtitle files immediately at startup
demuxer-lavf-probe-start-time=no        # Stops mpv from resetting network state on track change
stream-buffer-size=512KiB               # Optimizes network packet chunks to prevent desync flushes
demuxer-max-bytes-per-sec=0             # Don't throttle connection speed when buffering
cache-pause=no                          # Stops player from pausing/hiccuping when tracks cycle
hls-bitrate=max                         # Locks the video quality stream so it never drops to re-buffer

# --- Force FFmpeg to Pull ALL Streams in the Packet Instantly ---
demuxer-lavf-o=discard=corrupt          # Stop discarding non-selected packet streams 
demuxer-lavf-probe-info=all             # Scan and analyze every audio/subtitle track at absolute startup

# --- For yt-dlp/YouTube URL Streams ---
ytdl-raw-options=embed-subs=,write-subs=,sub-langs="all"
